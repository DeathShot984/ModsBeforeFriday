name: Build MBF Agent

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java (required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653'

      - name: Configure NDK linker
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "NDK bin path: $NDK_BIN"
          ls "$NDK_BIN" | grep aarch64
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$NDK_BIN/aarch64-linux-android21-clang"
          ar = "$NDK_BIN/llvm-ar"
          EOF
          echo "Contents of .cargo/config.toml:"
          cat .cargo/config.toml

      - name: Add NDK to PATH
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build agent
        run: cargo build --manifest-path mbf-agent/Cargo.toml --target aarch64-linux-android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbf-agent
          path: target/aarch64-linux-android/debug/mbf-agent