name: Build MBF Agent

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mbf-agent/**'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;27.0.12077973'

      - name: Configure NDK linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-linux-android]' >> .cargo/config.toml
          echo 'linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"' >> .cargo/config.toml

      - name: Build agent
        run: |
          cargo build \
            --manifest-path mbf-agent/Cargo.toml \
            --target aarch64-linux-android

      - name: Copy agent to output
        run: |
          cp target/aarch64-linux-android/debug/mbf-agent mbf-site/public/mbf-agent

      - name: Commit built agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mbf-site/public/mbf-agent
          git diff --staged --quiet || git commit -m "ci: update built mbf-agent"
          git push